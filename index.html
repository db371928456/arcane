// ═══ 數據持久化 ═══
const STORAGE_KEY = "arcane_chronicles_data";

const defaultData = {
  points: 0,
  uploads: [],
  purchased: [],
  currentTitle: null,
  drawings: [],
  posts: [],
  todayDrawPts: 0,
  lastDrawDate: null,
  lastCheckIn: null,
  loginCount: 0,
  joinDate: null,
  customName: null,
  isFirstLogin: true,
};

function loadData(role) {
  try {
    const key = STORAGE_KEY + "_" + role;
    const data = localStorage.getItem(key);
    if (data) {
      const parsed = JSON.parse(data);
      const today = new Date().toDateString();
      if (parsed.lastDrawDate !== today) {
        parsed.todayDrawPts = 0;
        parsed.lastDrawDate = today;
      }
      return { ...defaultData, ...parsed };
    }
  } catch (e) { console.error(e); }
  return { ...defaultData, joinDate: new Date().toLocaleDateString('zh-TW'), lastDrawDate: new Date().toDateString(), isFirstLogin: true };
}

function saveData(role, data) {
  try {
    localStorage.setItem(STORAGE_KEY + "_" + role, JSON.stringify(data));
  } catch (e) { console.error(e); }
}

  return autoTitles;
}

// 占卜計算
function divineCalc(name, q, seed) {
  const c = name + "夏娃" + q + seed;
  let h = 0;
  for (let i = 0; i < c.length; i++) { h = ((h << 5) - h) + c.charCodeAt(i); h = h & h; }
  const a = Math.abs(h);
  const p1 = (a % 40) + 35;
  const p2 = ((a >> 8) % 35) + 20;
  return { p1, p2, p3: 100 - p1 - p2 };
}

}

// ═══ 主 App ═══
function App() {
  const [stage, setStage] = useState("login");
  const [tab, setTab] = useState("upload");
  const [u, setU] = useState("");
  const [p, setP] = useState("");
  const [notif, setNotif] = useState(null);
  const [role, setRole] = useState(null);
  const [data, setData] = useState(defaultData);
  const [showFirstNameModal, setShowFirstNameModal] = useState(false);
  const [firstName, setFirstName] = useState("");

  const showNotif = (m) => { setNotif(m); setTimeout(() => setNotif(null), 2500); };
  
  const updateData = (updater) => {
    setData(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      if (role) saveData(role, next);
      return next;
    });
  };

  const login = () => {
    if (!u.trim() || !p.trim()) { showNotif("請輸入帳號和密碼"); return; }
    let newRole = null;
    if (u === "管理員" && p === "武者") newRole = "admin";
    else if (u === "@@" && p === "##") newRole = "user";
    else { showNotif("帳號或密碼錯誤"); return; }
    
    setRole(newRole);
    const loaded = loadData(newRole);
    loaded.loginCount = (loaded.loginCount || 0) + 1;
    setData(loaded);
    saveData(newRole, loaded);
    
    // 檢查是否需要首次命名
    if (!loaded.customName || loaded.isFirstLogin) {
      setShowFirstNameModal(true);
    }
    
    setStage("main");
    setU(""); setP("");
  };

  const handleFirstName = () => {
    if (!firstName.trim()) { showNotif("請輸入你的術士名號"); return; }
    if (firstName.trim().length > 12) { showNotif("名號不能超過12字"); return; }
    updateData(prev => ({ ...prev, customName: firstName.trim(), isFirstLogin: false }));
    setShowFirstNameModal(false);
    setFirstName("");
    showNotif("歡迎加入玄秘紀元，" + firstName.trim() + "！");
  };

  const logout = () => {
    setStage("login"); setRole(null); setData(defaultData); setTab("upload"); showNotif("已登出");
  };

  return (
    <div style={{ background: "#080810", minHeight: "100vh", overflow: "hidden", position: "relative" }}>

        ))}
      </div>
      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", overflow: "hidden" }}>
        {PARTICLES.map(p => (
          <div key={p.id} className="particle" style={{ left: `${p.left}%`, bottom: 0, width: `${p.size}px`, height: `${p.size}px`, animationDuration: `${p.duration}s`, animationDelay: `${p.delay}s` }} />
        ))}

// ═══ 登入頁 ═══
function Login({ u, setU, p, setP, onLogin }) {
  const [showInstall, setShowInstall] = useState(false);
  const [deferredPrompt, setDeferredPrompt] = useState(null);

  useEffect(() => {
    const handler = (e) => {
      e.preventDefault();
      setDeferredPrompt(e);
      setShowInstall(true);
    };
    window.addEventListener('beforeinstallprompt', handler);
    
    // 檢查是否已安裝
    if (window.matchMedia('(display-mode: standalone)').matches) {
      setShowInstall(false);
    }
    
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  const handleInstall = async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        setShowInstall(false);
      }
      setDeferredPrompt(null);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, position: "relative" }}>
      <div style={{ position: "absolute", width: 360, height: 360, borderRadius: "50%", border: "1px solid rgba(139,92,246,.12)", top: "50%", left: "50%", transform: "translate(-50%,-50%)" }} className="spin-ring" />

          <div style={{ fontSize: 56, marginBottom: 10 }}>🔮</div>

          <p style={{ color: "rgba(167,139,250,.6)", fontFamily: "'Cinzel',serif", fontSize: 10, letterSpacing: 4, marginTop: 6 }}>ARCANE CHRONICLES</p>
        </div>
        <div style={{ background: "rgba(8,8,20,.85)", backdropFilter: "blur(20px)", border: "1px solid rgba(139,92,246,.3)", borderRadius: 20, padding: "28px 24px" }}>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: "block", color: "rgba(167,139,250,.8)", fontSize: 11, letterSpacing: 2, marginBottom: 6 }}>帳號</label>
            <input type="text" placeholder="輸入帳號..." value={u} onChange={e => setU(e.target.value)} onKeyDown={e => e.key === "Enter" && onLogin()} />
          </div>
          <div style={{ marginBottom: 22 }}>
            <label style={{ display: "block", color: "rgba(167,139,250,.8)", fontSize: 11, letterSpacing: 2, marginBottom: 6 }}>密碼</label>
            <input type="password" placeholder="輸入密碼..." value={p} onChange={e => setP(e.target.value)} onKeyDown={e => e.key === "Enter" && onLogin()} />
          </div>
          <button className="mbtn" onClick={onLogin}>登入</button>
          
          {showInstall && (
            <button 
              className="mbtn" 
              onClick={handleInstall}
              style={{ marginTop: 12, background: "rgba(139,92,246,.25)" }}
            >
              加入桌面
            </button>
          )}
        </div>
        
        {/* iOS 安裝提示 */}
        {/iPhone|iPad|iPod/.test(navigator.userAgent) && !window.navigator.standalone && (
          <div style={{ marginTop: 16, padding: 14, background: "rgba(139,92,246,.1)", border: "1px solid rgba(139,92,246,.25)", borderRadius: 12, textAlign: "center" }}>
            <p style={{ color: "rgba(226,232,240,.7)", fontSize: 11, lineHeight: 1.6 }}>
              iOS 用戶：點擊 Safari 分享按鈕<br/>
              然後選擇「加入主畫面」即可安裝
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

            <span>{t.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══ 上傳 Tab ═══
function Upload({ showNotif, data, updateData }) {
  const [sel, setSel] = useState(null);
  const [magicSubType, setMagicSubType] = useState("白魔法");
  const [preview, setPreview] = useState(null);
  const [result, setResult] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [note, setNote] = useState("");
  const galleryRef = useRef(null);
  const cameraRef = useRef(null);

  const cats = [
    { id: "magic", icon: "🧙", label: "魔法道法", desc: "施法・符陣", c: "#8b5cf6", r: "139,92,246", pts: 10 },
    { id: "creature", icon: "🐉", label: "神秘生物", desc: "靈異生物", c: "#10b981", r: "16,185,129", pts: 15 },
    { id: "place", icon: "🌙", label: "神秘地點", desc: "廟宇・秘境", c: "#3b82f6", r: "59,130,246", pts: 20 },
  ];
  
  const magicTypes = ["白魔法", "黑魔法", "自然魔法", "古老的紗草紙魔法", "一般魔法"];

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const submit = () => {
    if (!sel) { showNotif("請先選擇類型"); return; }
    if (!preview) { showNotif("請先選擇照片"); return; }
    
    setUploading(true);
    const tMap = { magic: magicSubType, creature: "靈體探查", place: "靈地探尋" };
    const qMap = { magic: "魔法是否成功", creature: "是否拍到生物", place: "是否探到靈地" };
    
    setTimeout(() => {
      const { p1, p2, p3 } = divineCalc("術士", qMap[sel], Date.now().toString());
      
      const isVerifiedSuccess = sel === "place" && p1 >= 50;

      const newResult = {
        type: sel, label: tMap[sel],
        isVerified: isVerifiedSuccess,
        o1: { pct: p1, text: getOutcome(sel, 1) },
        o2: { pct: p2, text: getOutcome(sel, 2) },
        o3: { pct: p3, text: getOutcome(sel, 3) }
      };
      setResult(newResult);
      
      const pts = sel === "place" ? 20 : sel === "creature" ? 15 : 10;
      const newUpload = {
        id: Date.now(),
        type: sel, 
        subType: sel === "magic" ? magicSubType : null,
        label: tMap[sel],
        preview, points: pts, note,
        verifiedSuccess: isVerifiedSuccess,
        time: new Date().toLocaleString('zh-TW'),
        timestamp: Date.now(),
        result: { p1, p2, p3 }
      };
      
      updateData(prev => ({
        ...prev,
        uploads: [newUpload, ...prev.uploads],
        points: prev.points + pts
      }));
      
      if (isVerifiedSuccess) {
        showNotif("探險驗證成功！+" + pts + " 點並計入任務進度");
      } else {
        showNotif("上傳成功！+" + pts + " 點");
      }
      setUploading(false);
    }, 2000);
  };

  const reset = () => { setResult(null); setSel(null); setPreview(null); setNote(""); };

  return (
    <div className="tab-in">
      <h2 style={{ fontFamily: "'Cinzel',serif", fontSize: 17, letterSpacing: 1, marginBottom: 4 }}>探險打卡</h2>
      <p style={{ color: "rgba(226,232,240,.45)", fontSize: 12, marginBottom: 16 }}>選擇類型，從相簿或相機上傳紀錄</p>
      
      {!result ? (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
            {cats.map(c => (
              <div key={c.id} className={`cat-card ${sel === c.id ? "sel" : ""}`} onClick={() => setSel(c.id)} style={{ borderColor: sel === c.id ? c.c : undefined }}>
                <div style={{ fontSize: 24, marginBottom: 4 }}>{c.icon}</div>
                <div style={{ color: sel === c.id ? c.c : "rgba(226,232,240,.75)", fontFamily: "'Cinzel',serif", fontSize: 11, fontWeight: 600, marginBottom: 2 }}>{c.label}</div>
                <div style={{ background: `rgba(${c.r},.18)`, borderRadius: 100, padding: "2px 7px", display: "inline-block", marginTop: 4 }}>
                  <span style={{ color: c.c, fontSize: 9, fontFamily: "'Cinzel',serif" }}>+{c.pts}</span>
                </div>
              </div>
            ))}
          </div>
          
          {sel === "magic" && (
            <div className="fade-up" style={{ marginBottom: 14 }}>
              <label style={{ display: "block", color: "rgba(167,139,250,.8)", fontSize: 11, marginBottom: 6 }}>魔法專精分支</label>
              <select value={magicSubType} onChange={e => setMagicSubType(e.target.value)}>
                {magicTypes.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          )}

          {preview ? (
            <div style={{ marginBottom: 14 }}>
              <img src={preview} alt="預覽" className="upload-preview" style={{ marginBottom: 10 }} />
              <button className="mbtn mbtn-cancel" style={{ padding: "10px", fontSize: 12 }} onClick={() => { setPreview(null); }}>重新選擇照片</button>
            </div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
              <div className="up-zone" onClick={() => galleryRef.current.click()}>
                <div style={{ fontSize: 30, marginBottom: 6 }}>🖼️</div>
                <p style={{ color: "rgba(167,139,250,.7)", fontSize: 11 }}>從相簿選擇</p>
                <input ref={galleryRef} type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
              </div>
              <div className="up-zone" onClick={() => cameraRef.current.click()}>
                <div style={{ fontSize: 30, marginBottom: 6 }}>📷</div>
                <p style={{ color: "rgba(167,139,250,.7)", fontSize: 11 }}>拍照上傳</p>
                <input ref={cameraRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{ display: "none" }} />
              </div>
            </div>
          )}

          {preview && (
            <div style={{ marginBottom: 14 }}>
              <textarea placeholder="描述你的探險或儀式紀錄..." value={note} onChange={e => setNote(e.target.value)} style={{ minHeight: 60 }} />
            </div>
          )}

          <button className="mbtn" onClick={submit} disabled={!sel || !preview || uploading}>
            {uploading ? "靈界占卜中..." : "提交上傳"}
          </button>
        </>
      ) : (
        <div className="fade-up">
          <img src={preview} alt="" className="upload-preview" style={{ marginBottom: 12 }} />
          <div style={{ padding: 12, background: "rgba(139,92,246,.08)", borderRadius: 10, textAlign: "center", marginBottom: 12 }}>
            <p style={{ fontFamily: "'Cinzel',serif", color: "#a78bfa", fontSize: 11, marginBottom: 6 }}>靈界占卜結果</p>
            <p style={{ color: "rgba(226,232,240,.7)", fontSize: 12 }}>{result.label} 的反饋</p>
          </div>
          
          {result.type === "place" && (
            <div style={{ marginBottom: 12, padding: 10, borderRadius: 10, background: result.isVerified ? "rgba(52,211,153,0.12)" : "rgba(239,68,68,0.12)", border: result.isVerified ? "1px solid #34d399" : "1px solid #ef4444", textAlign: 'center' }}>
              <p style={{ fontSize: 12, color: result.isVerified ? "#34d399" : "#ef4444", fontWeight: 'bold' }}>
                {result.isVerified ? "經靈界驗證：探險成功！(已計入稱號任務)" : "經靈界驗證：成功能量不足 (不計入次數)"}
              </p>
            </div>
          )}

          {[result.o1, result.o2, result.o3].map((o, i) => (
            <div key={i} className="oracle-box">
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                <span style={{ fontSize: 11, color: "#a78bfa" }}>可能性 {i + 1}</span>
                <span style={{ color: "#22d3ee", fontWeight: 700, fontSize: 12 }}>{o.pct}%</span>
              </div>
              <p style={{ color: "rgba(226,232,240,.7)", fontSize: 11, lineHeight: 1.5 }}>{o.text}</p>
            </div>
          ))}
          <button className="mbtn mbtn-cancel" onClick={reset} style={{ marginTop: 12 }}>繼續上傳</button>
        </div>
      )}
    </div>
  );
}

function Points({ data, showNotif, updateData }) {
  const level = Math.floor(data.points / 250) + 1;
  const nextLevelPts = level * 250;
  const progressPct = ((data.points - (level - 1) * 250) / 250) * 100;

  const today = new Date().toDateString();
  const canCheckIn = data.lastCheckIn !== today;

  const successExplorations = data.uploads.filter(u => u.type === 'place' && u.verifiedSuccess).length;

  const missionList = [
    { name: "探靈者", count: 10, icon: "👁️" },
    { name: "尋靈者", count: 50, icon: "🕯️" },
    { name: "靈界行者", count: 100, icon: "🌀" },
  ];

  const handleCheckIn = () => {
    updateData(prev => ({ ...prev, points: prev.points + 1, lastCheckIn: today }));
    showNotif("每日打卡成功！獲得 1 點");
  };

  return (
    <div className="tab-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>

      </div>

      <div style={{ textAlign: "center", marginBottom: 20, padding: "24px 12px", position: "relative", borderRadius: 18, overflow: "hidden" }}>
        <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at center,rgba(139,92,246,.14),transparent 70%)" }} />
        <div style={{ position: "relative" }}>
          <div style={{ width: 110, height: 110, margin: "0 auto 14px" }}>
            <div className="spin-ring" style={{ width: 110, height: 110, borderRadius: "50%", padding: 3, background: "conic-gradient(from 0deg,#7c3aed,#0891b2,#a78bfa,#7c3aed)" }}>
              <div style={{ width: "100%", height: "100%", borderRadius: "50%", background: "#0d0d1a", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <span style={{ fontSize: 30 }}>💎</span>

          <div className="grad-text" style={{ fontSize: 38, fontWeight: 900, lineHeight: 1, marginBottom: 6 }}>{data.points.toLocaleString()}</div>

      <div className="card" style={{ marginBottom: 20 }}>

          <span style={{ color: "rgba(226,232,240,.45)", fontSize: 11 }}>{data.points} / {nextLevelPts}</span>
        </div>
        <div style={{ height: 6, background: "rgba(139,92,246,.18)", borderRadius: 3, overflow: "hidden" }}>
          <div style={{ width: `${Math.min(progressPct, 100)}%`, height: "100%", background: "linear-gradient(to right,#7c3aed,#0891b2)" }} />

      </div>

      <h3 style={{ fontFamily: "'Cinzel',serif", color: "#a78bfa", fontSize: 13, letterSpacing: 1, marginBottom: 10 }}>探險稱號任務區 (不開放販售)</h3>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

          return (
            <div key={m.name} className="card" style={{ padding: 12, opacity: isDone ? 1 : 0.7 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ fontSize: 18 }}>{m.icon}</span>
                  <span style={{ fontSize: 13, fontWeight: 'bold', color: isDone ? '#22d3ee' : '#e2e8f0' }}>{m.name}</span>
                </div>
                <span style={{ fontSize: 11, color: "rgba(226,232,240,0.5)" }}>
                  {successExplorations} / {m.count} 次成功

              <div style={{ height: 4, background: "rgba(255,255,255,0.05)", borderRadius: 2, overflow: "hidden", marginBottom: 4 }}>

          );
        })}
      </div>
    </div>
  );
}

// ═══ 商店 Tab ═══
function Shop({ showNotif, data, updateData }) {
  const [filter, setFilter] = useState("all");
  const [modal, setModal] = useState(null);

  const filters = [
    { id: "all", label: "全部", icon: "✦" },
    { id: "title", label: "稱號", icon: "👑" },
    { id: "magic", label: "魔法", icon: "✨" },
    { id: "summon", label: "召喚", icon: "🦊" },
    { id: "item", label: "道具", icon: "📜" },
  ];

  const filtered = SHOP_ITEMS.filter(i => filter === "all" || i.type === filter);

  const checkReq = (req) => {
    if (!req) return { ok: true, msg: "" };
    if (req.type === 'hasItems') {
      const hasAll = req.items.every(id => data.purchased.includes(id));
      return { ok: hasAll, msg: "需先獲得金木水雷四象內練術" };
    }
    if (req.type === 'magicUse') {
      const count = data.uploads.filter(u => u.subType === req.target).length;
      return { ok: count >= req.count, msg: "需成功施展「" + req.target + "」" + req.count + " 次 (目前: " + count + ")" };
    }
    if (req.type === 'drawUse') {
      const count = data.drawings.filter(d => d.subType === req.target).length;
      return { ok: count >= req.count, msg: "需成功繪製「" + req.target + "」" + req.count + " 次 (目前: " + count + ")" };
    }
    return { ok: true, msg: "" };
  };

  const buy = (item) => {
    if (item.type !== "magic" && data.purchased.includes(item.id)) { showNotif("已擁有"); return; }
    setModal(item);
  };

  const confirm = (item) => {
    const status = checkReq(item.req);
    if (!status.ok) { showNotif("條件未達成: " + status.msg); return; }
    if (data.points < item.cost) { showNotif("神秘點數不足！"); setModal(null); return; }
    
    updateData(prev => ({
      ...prev,
      points: prev.points - item.cost,
      purchased: [...prev.purchased, item.id]
    }));
    setModal(null);
    showNotif("成功解鎖「" + item.name + "」！");
  };

  return (
    <div className="tab-in">
      <h2 style={{ fontSize: 17, letterSpacing: 1, marginBottom: 4 }}>神秘兌換商店</h2>
      <p style={{ color: "rgba(226,232,240,.45)", fontSize: 12, marginBottom: 14 }}>消耗點數兌換神秘力量與進階稱號</p>

      <div className="filter-bar" style={{ marginBottom: 14 }}>
        {filters.map(f => (
          <span key={f.id} className="fpill" onClick={() => setFilter(f.id)} style={{
            borderColor: filter === f.id ? "rgba(167,139,250,.7)" : "rgba(139,92,246,.2)",
            background: filter === f.id ? "rgba(139,92,246,.2)" : "transparent",
            color: filter === f.id ? "#a78bfa" : "rgba(226,232,240,.45)",
          }}>{f.icon} {f.label}</span>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {filtered.map(item => {
          const owned = data.purchased.includes(item.id);
          const isMagic = item.type === "magic";
          const ownedCount = data.purchased.filter(id => id === item.id).length;
          
          return (
            <div key={item.id} className={`shop-item ${owned && !isMagic ? "owned" : ""}`} onClick={() => buy(item)}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 26, marginBottom: 6 }}>{item.icon}</div>
                <div style={{ color: "#e2e8f0", fontSize: 11, fontWeight: 600, marginBottom: 4 }}>{item.name}</div>
                <div style={{ color: "rgba(226,232,240,.4)", fontSize: 9, marginBottom: 6, minHeight: 24 }}>{item.desc}</div>
                {owned && !isMagic ? (
                  <span className="tag" style={{ background: "rgba(52,211,153,.14)", border: "1px solid rgba(52,211,153,.3)", color: "#34d399" }}>已解鎖</span>
                ) : (
                  <span className="tag" style={{ background: "rgba(245,158,11,.14)", border: "1px solid rgba(245,158,11,.3)", color: "#fbbf24" }}>
                    💎 {item.cost} {isMagic && ownedCount > 0 && "(" + toChineseNum(ownedCount) + "次)"}
                  </span>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {modal && (
        <BuyModal 
          item={modal} 
          status={checkReq(modal.req)}
          onConfirm={() => confirm(modal)} 
          onCancel={() => setModal(null)} 
        />
      )}
    </div>
  );
}

function BuyModal({ item, status, onConfirm, onCancel }) {
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div style={{ fontSize: 50, marginBottom: 12 }}>{item.icon}</div>
        <h3 style={{ fontSize: 17, fontWeight: 700, marginBottom: 4 }}>{item.name}</h3>
        <p style={{ color: "rgba(226,232,240,.5)", fontSize: 11, marginBottom: 16 }}>{item.desc}</p>
        
        <div style={{ background: "rgba(139,92,246,.1)", borderRadius: 12, padding: 12, marginBottom: 16 }}>
          {item.req && (
            <div style={{ marginBottom: 10, paddingBottom: 10, borderBottom: "1px solid rgba(139,92,246,.2)" }}>
              <p style={{ color: status.ok ? "#34d399" : "#fbbf24", fontSize: 11 }}>
                {status.ok ? "驗證通過" : "驗證未通過"}
              </p>
              <p style={{ color: "rgba(226,232,240,.6)", fontSize: 10, marginTop: 4 }}>{status.msg}</p>
            </div>
          )}
          <p style={{ color: "rgba(226,232,240,.6)", fontSize: 11, marginBottom: 4 }}>所需點數</p>
          <p style={{ color: "#fbbf24", fontSize: 22, fontWeight: 900 }}>💎 {item.cost}</p>
        </div>
        
        <div style={{ display: "flex", gap: 8 }}>
          <button className="mbtn" style={{ flex: 1, padding: 10, fontSize: 12 }} onClick={onConfirm} disabled={!status.ok}>
            {status.ok ? "確定兌換" : "未達條件"}

        </div>

  );

// ═══ 繪圖 Tab ═══
function Draw({ showNotif, data, updateData }) {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [color, setColor] = useState("#a78bfa");
  const [size, setSize] = useState(4);
  const [mode, setMode] = useState("draw");
  const [drawType, setDrawType] = useState("一般魔法陣");

  const colors = ["#a78bfa", "#06b6d4", "#f59e0b", "#ef4444", "#10b981", "#ffffff"];

  useEffect(() => {
    const canvas = canvasRef.current;
    if (canvas) { canvas.getContext('2d').fillRect(0, 0, canvas.width, canvas.height); }
  }, []);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
    const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
    return { x: x * (canvasRef.current.width / rect.width), y: y * (canvasRef.current.height / rect.height) };
  };

  const start = (e) => { e.preventDefault(); const {x,y} = getPos(e); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x,y); setDrawing(true); };
  const move = (e) => { if(!drawing) return; e.preventDefault(); const ctx = canvasRef.current.getContext('2d'); ctx.lineWidth=size; ctx.lineCap="round"; ctx.strokeStyle = mode==="erase"?"#0d0d1a":color; ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); };
  const end = () => setDrawing(false);
  const clear = () => { canvasRef.current.getContext('2d').fillRect(0, 0, 800, 500); };

  const submit = () => {
    const pts = data.todayDrawPts < 25 ? 5 : 0;
    const newDrawing = { id: Date.now(), image: canvasRef.current.toDataURL(), subType: drawType, time: new Date().toLocaleDateString() };
    updateData(prev => ({
      ...prev,
      drawings: [newDrawing, ...prev.drawings],
      todayDrawPts: prev.todayDrawPts + pts,
      points: prev.points + pts,
      lastDrawDate: new Date().toDateString()
    }));
    showNotif(pts > 0 ? "繪圖提交成功！+5 點" : "繪圖紀錄已保存 (成就+1)");
    clear();
  };

  return (
    <div className="tab-in">
      <h2 style={{ fontSize: 17, marginBottom: 4 }}>魔法陣繪製</h2>
      <p style={{ color: "rgba(226,232,240,.45)", fontSize: 12, marginBottom: 12 }}>每日限得25點，但可無限繪製解鎖成就</p>
      
      <div className="fade-up" style={{ marginBottom: 10 }}>
        <label style={{ display: "block", color: "rgba(167,139,250,.8)", fontSize: 11, marginBottom: 6 }}>選擇繪製目標</label>
        <select value={drawType} onChange={e => setDrawType(e.target.value)}>
          <option value="一般魔法陣">一般魔法陣</option>
          <option value="盧恩符文">盧恩符文</option>
          <option value="符籙">符籙</option>
        </select>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
        {colors.map(c => (
          <button key={c} onClick={() => { setColor(c); setMode("draw"); }} style={{ width: 32, height: 32, borderRadius: 6, background: c, border: (color === c && mode === "draw") ? "2px solid #fff" : "none" }} />
        ))}
        <button onClick={() => setMode("erase")} style={{ minWidth: 40, height: 32, borderRadius: 6, background: "rgba(139,92,246,.2)", color: "#fff", border: mode==="erase"?"2px solid #fff":"none" }}>橡皮</button>
      </div>

      <canvas ref={canvasRef} width={800} height={500} onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={move} onTouchEnd={end} style={{ border: "2px solid rgba(139,92,246,.3)", borderRadius: 10, width: "100%", touchAction: "none", marginBottom: 12 }} />
      <button className="mbtn" onClick={submit}>提交 {drawType}</button>
    </div>
  );
}

function Profile({ role, data, updateData, onLogout, showNotif }) {

  const [newName, setNewName] = useState("");

  const allAvailableTitles = [...SHOP_ITEMS.filter(i => data.purchased.includes(i.id) && i.type === "title"), ...autoTitles];
  
  const magicCounts = {};
  data.purchased.forEach(id => {
    const item = SHOP_ITEMS.find(i => i.id === id && i.type === "magic");
    if (item) { magicCounts[item.name] = (magicCounts[item.name] || 0) + 1; }
  });

  const purchasedOtherItems = SHOP_ITEMS.filter(i => data.purchased.includes(i.id) && i.type !== "title" && i.type !== "magic");
  const currentTitleObj = data.currentTitle ? [...SHOP_ITEMS, ...autoTitles].find(s => s.id === data.currentTitle) : null;
  const level = Math.floor(data.points / 250) + 1;

  const getDisplayName = () => {
    if (data.customName) return data.customName;
    return role === "admin" ? "管理員" : "見習術士";
  };

  const setTitle = (id) => { updateData(prev => ({ ...prev, currentTitle: id })); setShowTitleSelect(false); };
  const resetAll = () => { 
    if(confirm("確定重置所有數據？這將清除你的所有進度。")) {

          <div><p style={{ color: "#a78bfa", fontSize: 10 }}>稱號</p><p style={{ fontSize: 15, fontWeight: 700 }}>{allAvailableTitles.length}</p></div>

.mbtn-danger{background:linear-gradient(135deg,#dc2626,#991b1b)!important;}
.ntab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;border-radius:10px;cursor:pointer;transition:all .3s;color:rgba(226,232,240,.4);font-family:'Cinzel',serif;border:1px solid transparent;flex:1;}
.ntab.on{color:#a78bfa;background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.3);}
.ntab span:first-child{font-size:18px;}
.ntab span:last-child{font-size:9px;}
.card{background:rgba(255,255,255,.025);border:1px solid rgba(139,92,246,.18);border-radius:14px;padding:16px;transition:all .3s;}
.cat-card{border:2px solid rgba(139,92,246,.18);border-radius:14px;padding:14px 6px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.015);}
.cat-card.sel{border-color:#a78bfa;background:rgba(139,92,246,.12);transform:translateY(-3px);}
.up-zone{border:2px dashed rgba(139,92,246,.35);border-radius:14px;padding:22px 12px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(139,92,246,.04);}
.oracle-box{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:12px;margin:8px 0;}
.shop-item{background:rgba(255,255,255,.025);border:1px solid rgba(139,92,246,.18);border-radius:12px;padding:12px;cursor:pointer;transition:all .3s;}
.shop-item.owned{opacity:.7;border-color:rgba(52,211,153,.4);}
.tag{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-family:'Cinzel',serif;}
.notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(124,58,237,.92),rgba(8,145,178,.92));color:#fff;padding:11px 24px;border-radius:100px;font-size:12px;z-index:9999;backdrop-filter:blur(12px);max-width:90vw;text-align:center;}
.modal-overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:rgba(8,8,20,.95);border:1px solid rgba(139,92,246,.4);border-radius:18px;padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 0 60px rgba(139,92,246,.2);}
.upload-preview{width:100%;max-height:280px;border-radius:10px;object-fit:contain;background:rgba(139,92,246,.05);}
.spin-ring{animation:spin-slow 8s linear infinite;}
.grad-text{background:linear-gradient(135deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tabbar{padding:6px 4px;background:rgba(6,6,16,.96);backdrop-filter:blur(20px);border-top:1px solid rgba(139,92,246,.18);display:flex;justify-content:space-around;position:sticky;bottom:0;z-index:100;gap:2px;}
.filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;}
.fpill{padding:5px 12px;border-radius:100px;font-size:11px;cursor:pointer;border:1px solid;transition:all .3s;white-space:nowrap;flex-shrink:0;}
`;

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
