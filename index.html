<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700&family=Noto+Serif+TC:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#050508;height:100%;font-family:'Noto Serif TC','Cinzel',serif;color:#d1d5db;overflow:hidden}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

/* 灰燼與血滴特效 */
.ash{position:fixed;border-radius:50%;background:rgba(156,163,175,0.6);pointer-events:none;animation:drift var(--d,5s) ease-in-out infinite;animation-delay:var(--delay,0s)}
@keyframes drift{0%{transform:translateY(-10vh) translateX(0);opacity:0}20%{opacity:.8}80%{opacity:.5}100%{transform:translateY(100vh) translateX(20px);opacity:0}}
.blood-drop{position:fixed;border-radius:50%;background:radial-gradient(circle,rgba(185,28,28,.8),transparent);animation:fall var(--d,4s) linear infinite;animation-delay:var(--delay,0s);pointer-events:none}
@keyframes fall{0%{transform:translateY(-10vh) scale(1);opacity:0}10%{opacity:.8}90%{opacity:.6}100%{transform:translateY(100vh) scale(0.5);opacity:0}}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.fade-in{animation:fadeIn .6s cubic-bezier(0.16, 1, 0.3, 1) forwards}

input,textarea,select{background:rgba(185,28,28,.05);border:1px solid rgba(185,28,28,.25);color:#e5e7eb;padding:11px 14px;border-radius:6px;width:100%;font-family:'Noto Serif TC',serif;font-size:14px;outline:none;transition:border .3s}
input:focus,textarea:focus,select:focus{border-color:rgba(185,28,28,.7);box-shadow:0 0 15px rgba(185,28,28,.2)}
input::placeholder,textarea::placeholder{color:rgba(209,213,219,.3)}
textarea{resize:none;min-height:80px}
select option{background:#0a0a0f}
input[type=range]{padding:0;background:none;border:none;box-shadow:none;accent-color:#b91c1c}
input[type=file]{display:none}

.btn{background:linear-gradient(135deg,#7f1d1d,#450a0a);border:1px solid #991b1b;color:#f3f4f6;padding:13px;border-radius:6px;font-family:'Cinzel',serif;font-weight:700;font-size:13px;letter-spacing:2px;cursor:pointer;width:100%;transition:all .3s;display:block;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,0.8)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(153,27,27,.4);border-color:#ef4444}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-muted{background:rgba(156,163,175,.1)!important;border-color:rgba(156,163,175,.2)!important;color:#9ca3af!important;letter-spacing:1px!important}
.btn-danger{background:linear-gradient(135deg,#991b1b,#000000)!important;border-color:#dc2626!important;color:#fca5a5!important}
.btn-sm{padding:9px;font-size:12px;letter-spacing:1px}

.card{background:rgba(20,10,10,.6);border:1px solid rgba(185,28,28,.2);border-radius:8px;padding:16px;box-shadow:inset 0 0 20px rgba(0,0,0,0.8)}
.cat-card{border:1px solid rgba(156,163,175,.15);border-radius:8px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(0,0,0,.4)}
.cat-card.sel{border-color:#dc2626;background:rgba(185,28,28,.15);transform:translateY(-3px);box-shadow:0 4px 15px rgba(185,28,28,.2)}

.oracle-box{background:rgba(0,0,0,.5);border:1px solid rgba(185,28,28,.3);border-radius:6px;padding:12px;margin:8px 0;border-left:3px solid #b91c1c}
.shop-item{background:rgba(10,5,5,.8);border:1px solid rgba(156,163,175,.15);border-radius:8px;padding:12px;cursor:pointer;transition:all .3s;text-align:center}

.disc-card{border:1px solid rgba(156,163,175,.1);border-radius:8px;padding:14px;cursor:pointer;transition:all .3s;background:rgba(10,10,15,.6)}
.disc-card:hover{border-color:rgba(185,28,28,.4);background:rgba(185,28,28,.05)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-family:'Cinzel',serif;border:1px solid}

.header{padding:14px 16px 12px;background:rgba(5,5,8,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(185,28,28,.3);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}

.pts-num{color:#fca5a5;font-family:'Cinzel',serif;font-weight:700;font-size:15px;text-shadow:0 0 5px rgba(220,38,38,0.8)}

.tabbar{padding:6px 4px;padding-bottom:calc(6px + env(safe-area-inset-bottom,12px));background:rgba(5,5,8,.98);border-top:1px solid rgba(185,28,28,.3);display:flex;justify-content:space-around;position:fixed;bottom:0;left:0;right:0;z-index:100;max-width:480px;margin:0 auto;gap:2px}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:6px;cursor:pointer;transition:all .3s;color:#6b7280;flex:1}
.tab.on{color:#fca5a5;background:rgba(185,28,28,.15);box-shadow:inset 0 -2px 0 #dc2626}
.tab-icon{font-size:18px;line-height:1;filter:grayscale(100%) opacity(0.6)}
.tab.on .tab-icon{filter:none opacity(1);text-shadow:0 0 8px rgba(220,38,38,0.6)}
.tab-label{font-size:10px;font-family:'Noto Serif TC',serif;font-weight:700}

.content{flex:1;overflow-y:auto;padding:16px 14px 120px;-webkit-overflow-scrolling:touch}
.section-title{font-family:'Cinzel',serif;color:#fca5a5;font-size:18px;letter-spacing:2px;margin-bottom:4px;text-shadow:0 0 10px rgba(185,28,28,0.5)}
.section-sub{color:#9ca3af;font-size:12px;margin-bottom:16px}
.sec-label{font-family:'Cinzel',serif;color:#9ca3af;font-size:12px;letter-spacing:1px;margin-bottom:8px;border-bottom:1px solid rgba(156,163,175,.2);padding-bottom:4px}
.grad-text{color:#f87171;text-shadow:0 0 15px rgba(220,38,38,0.8)}

.modal-bg{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s ease}
.modal{background:rgba(10,5,5,.98);border:1px solid #7f1d1d;border-radius:8px;padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 0 40px rgba(185,28,28,.3)}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(185,28,28,.15);animation:spin 15s linear infinite;pointer-events:none}
.notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7f1d1d,#000000);border:1px solid #dc2626;color:#fca5a5;padding:12px 24px;border-radius:4px;font-size:13px;font-family:'Noto Serif TC',serif;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.8);max-width:90vw;text-align:center;animation:fadeIn .3s cubic-bezier(0.16, 1, 0.3, 1);white-space:nowrap;letter-spacing:1px}
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fpill{padding:6px 14px;border-radius:4px;font-size:12px;font-family:'Cinzel',serif;cursor:pointer;border:1px solid;transition:all .3s;white-space:nowrap;flex-shrink:0;background:rgba(0,0,0,.5)}
.spin-ring{animation:spin 12s linear infinite;width:110px;height:110px;border-radius:50%;padding:2px;background:conic-gradient(from 0deg,#7f1d1d,#111,#dc2626,#7f1d1d);flex-shrink:0}
.spin-ring-inner{width:100%;height:100%;border-radius:50%;background:#050508;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:inset 0 0 20px rgba(0,0,0,0.9)}
.preview-img{width:100%;max-height:280px;border-radius:4px;object-fit:cover;background:#000;display:block;margin-bottom:10px;border:1px solid #4b5563;filter:contrast(1.1) brightness(0.9)}
#draw-canvas{border:1px solid rgba(156,163,175,.3);border-radius:4px;width:100%;touch-action:none;display:block;cursor:crosshair;background:#0a0a0f;box-shadow:inset 0 0 30px rgba(0,0,0,0.9)}
.swatch{width:32px;height:32px;border-radius:4px;cursor:pointer;border:1px solid rgba(255,255,255,.1);flex-shrink:0;transition:transform .2s}
.swatch.active{border:2px solid #fca5a5;transform:scale(1.15);box-shadow:0 0 10px currentColor}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(185,28,28,.4);border-radius:2px}
</style>

<body>
<div id="app"></div>
<script>
const STORE_KEY = 'bloodborne_v1';
function defaultData() {
  return {points:0,uploads:[],purchased:[],currentTitle:null,drawings:[],posts:[],todayDrawPts:0,lastDrawDate:null,lastCheckIn:null,loginCount:0,joinDate:null,customName:null,isFirstLogin:true,dailyUploads:{arcane:0,beast:0,forbidden:0},lastUploadDate:null};
}
function loadData(role) {
  try {
    const raw = localStorage.getItem(STORE_KEY+'_'+role);
    if (raw) {
      const d = JSON.parse(raw);
      const today = new Date().toDateString();
      if (d.lastDrawDate !== today) { d.todayDrawPts=0; d.lastDrawDate=today; }
      if (d.lastUploadDate !== today) { d.dailyUploads={arcane:0,beast:0,forbidden:0}; d.lastUploadDate=today; }
      if (!d.posts) d.posts = [];
      return Object.assign(defaultData(), d);
    }
  } catch(e) {}
  return Object.assign(defaultData(), {joinDate:new Date().toLocaleDateString('zh-TW'), lastDrawDate:new Date().toDateString(), lastUploadDate:new Date().toDateString()});
}
function saveData(role, data) {
  try { localStorage.setItem(STORE_KEY+'_'+role, JSON.stringify(data)); } catch(e) {}
}
function getMoonPhase() {
  const known = new Date(2000,0,6,18,14);
  const phase = ((((Date.now()-known.getTime())/86400000)%29.53)+29.53)%29.53;
  const phases = [{name:'血月',symbol:'🌑',modifier:1.3},{name:'蒼白之月',symbol:'🌒',modifier:0.9},{name:'隱匿之月',symbol:'🌓',modifier:1.0},{name:'微光之月',symbol:'🌔',modifier:1.05},{name:'狂父滿月',symbol:'🌕',modifier:1.4},{name:'衰亡之月',symbol:'🌖',modifier:1.0},{name:'殘缺之月',symbol:'🌗',modifier:0.85},{name:'死寂之月',symbol:'🌘',modifier:0.8}];
  return phases[Math.min(Math.floor(phase/3.69),7)];
}
function getTimeEnergy() {
  const h = new Date().getHours();
  if (h>=23||h<3) return {name:'夜之夢魘',modifier:1.3};
  if (h>=3&&h<6)  return {name:'破曉前的瘋狂',modifier:1.2};
  if (h>=6&&h<12) return {name:'虛偽的白晝',modifier:0.7};
  if (h>=12&&h<17)return {name:'沉睡時刻',modifier:0.6};
  if (h>=17&&h<20)return {name:'黃昏血光',modifier:1.0};
  return {name:'逢魔之刻',modifier:1.15};
}
function divineCalc(name, q, seed) {
  const moon = getMoonPhase();
  const time = getTimeEnergy();
  const c = name+'上位者'+q+seed+moon.name+time.name;
  let h=0;
  for(let i=0;i<c.length;i++){h=((h<<5)-h)+c.charCodeAt(i);h=h&h;}
  const a=Math.abs(h);
  let p1 = Math.round(((a%40)+25)*moon.modifier*time.modifier);
  p1 = Math.min(Math.max(p1,10),80);
  const p2 = Math.min(Math.round(((a>>8)%30)+15), 100-p1-5);
  return {p1, p2, p3:100-p1-p2, moon, time};
}
const OUTCOMES = {
  arcane:{1:'啟蒙驟升！成功解讀古神低語，血質與祕法完美共鳴。',2:'儀式勉強完成，但心智受到輕微侵蝕，需服用鎮靜劑。',3:'儀式崩潰，陷入短暫的瘋狂，一無所獲。'},
  beast:{1:'獵殺完成！野獸倒在血泊中，取得珍貴的血之迴響。',2:'野獸逃脫，留下殘缺的毛皮與血跡，險象環生。',3:'這是不祥的徵兆...附近沒有獵物，只有死寂。'},
  forbidden:{1:'提燈點亮！發掘了被治癒教會隱藏的禁忌秘密。',2:'此處殘存著強烈的怨念與毒沼，探索艱難。',3:'古神設下結界，凡人不可涉足此等深淵。'}
};

// ── 最新版商店列表：免費啟蒙 + 進階召喚 + 解鎖稱號任務 ──
const SHOP = [
  {id:101,name:'初階啟蒙：古神凝視',cost:0,icon:'👁️',desc:'直視深淵的奧秘，喚醒內在的野獸血質（免費獲得）',type:'arcane'},
  {id:102,name:'血脈覺醒：亞南儀式',cost:0,icon:'🩸',desc:'引導古老血液流經全身，完成正式獵人洗禮（免費獲得）',type:'item'},
  {id:103,name:'夢境締結：未知低語',cost:0,icon:'🔮',desc:'與獵人夢境底層的古神意志簽署永久狩獵契約（免費獲得）',type:'summon'},
  
  {id:104,name:'召喚：血鴉之影',cost:100,icon:'🐦‍⬛',desc:'搖響共鳴鐘，召喚殘虐的血鴉獵人前來助陣',type:'summon'},
  {id:105,name:'召喚：暴獵復仇者',cost:1000,icon:'🪓',desc:'召喚陷入狂化邊緣的舊亞南復仇者',type:'summon'},
  {id:106,name:'召喚：迷宮死靈助手',cost:1000,icon:'👻',desc:'喚醒地下迷宮的死靈助手，為你探尋前路',type:'summon'},

  {id:107,name:'中空幻影外殼 (武器附魔)',cost:100,icon:'✨',desc:'使用星辰之力為武器附上祕法光芒',type:'item'},
  {id:108,name:'卡爾符文銘刻',cost:100,icon:'🪨',desc:'將古神低語化為文字，刻印於腦海',type:'arcane'},
  {id:109,name:'瘋狂宇宙殘卷 (混沌魔法)',cost:100,icon:'📖',desc:'翻閱不可名狀的禁忌之書，引發隨機祕法',type:'arcane'},
  {id:110,name:'治癒教會聖歌 (祈禱)',cost:100,icon:'🔔',desc:'吟唱高階聖職者的祈禱文，祈求血的恩寵',type:'arcane'},

  {id:201,name:'工場附魔大師',cost:1000,icon:'✨',desc:'解鎖條件：成功施展「武器附魔」100次',type:'title',req:{type:'magicUse',target:'武器附魔',count:100}},
  {id:202,name:'卡爾的繼承者',cost:1000,icon:'🪨',desc:'解鎖條件：成功施展「符文銘刻」100次',type:'title',req:{type:'magicUse',target:'符文銘刻',count:100}},
  {id:203,name:'混沌祕法師',cost:1000,icon:'🌌',desc:'解鎖條件：成功施展「混沌魔法」100次',type:'title',req:{type:'magicUse',target:'混沌魔法',count:100}},
  {id:204,name:'處刑隊聖騎士',cost:1000,icon:'⚔️',desc:'解鎖條件：成功吟唱「教會祈禱」100次',type:'title',req:{type:'magicUse',target:'教會祈禱',count:100}}
];

// 計算稱號解鎖條件（修復之前的檢查功能）
function checkReq(req, data) {
  if (!req) return {ok:true,msg:""};
  if (req.type==="magicUse") { 
    const count=data.uploads.filter(u=>u.type==='arcane'&&u.subType===req.target&&u.isSuccess).length; 
    return {ok:count>=req.count,msg:`需成功施展「${req.target}」${req.count}次（目前：${count}次）`}; 
  }
  return {ok:true,msg:""};
}

const DAILY_LIMITS = {arcane:50,beast:50,forbidden:50};
// 將新技能加入上傳類別，讓你每天可以打卡累積次數
const ARCANE_TYPES = ['教會祕法','宇宙之眼','血質轉換','古神契約','獸化控制','武器附魔','符文銘刻','混沌魔法','教會祈禱'];
let state = {stage:localStorage.getItem('bloodborne_session')?'main':'login',role:localStorage.getItem('bloodborne_session')||null,data:null,tab:'upload',notifTimer:null,drawColor:'#b91c1c',drawSize:4,drawMode:'draw',isDrawing:false};

if (state.role) { state.data=loadData(state.role); if(!state.data.customName) state.stage='name'; }

function $(id){ return document.getElementById(id); }
function E(tag,attrs={},...children) {
  const el=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){if(k==='class')el.className=v;else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k==='html')el.innerHTML=v;else el.setAttribute(k,v);}
  for(const c of children){if(c==null)continue;el.appendChild(typeof c==='string'?document.createTextNode(c):c);}
  return el;
}
function showNotif(msg){const el=$('notif');el.textContent=msg;el.style.display='block';if(state.notifTimer)clearTimeout(state.notifTimer);state.notifTimer=setTimeout(()=>el.style.display='none',3000);}
function updateData(updater){const prev=state.data;state.data=typeof updater==='function'?updater(prev):Object.assign({},prev,updater);saveData(state.role,state.data);render();}

function initBg(){
  const bg=$('bg');
  for(let i=0;i<40;i++){const s=document.createElement('div');s.className='ash';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;--d:${5+Math.random()*6}s;--delay:${Math.random()*5}s`;bg.appendChild(s);}
  for(let i=0;i<15;i++){const p=document.createElement('div');p.className='blood-drop';const size=2+Math.random()*4;p.style.cssText=`left:${Math.random()*100}%;top:0;width:${size}px;height:${size}px;--d:${3+Math.random()*5}s;--delay:${Math.random()*4}s`;bg.appendChild(p);}
}

function render(){const app=$('app-content');if(!app)return;app.innerHTML='';if(state.stage==='login'){app.appendChild(renderLogin());return;}if(state.stage==='name'){app.appendChild(renderNameModal());return;}if(state.stage==='main'){app.appendChild(renderMain());return;}}

function renderLogin(){
  const wrap=E('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',position:'relative'}});
  const r1=E('div',{class:'ring',style:{width:'360px',height:'360px',top:'50%',left:'50%',marginLeft:'-180px',marginTop:'-180px'}});

function showBuyModal(item){const existing=$('buy-modal');if(existing)existing.remove();const st=checkReq(item.req,state.data);const canAfford=state.data.points>=item.cost;const reqHtml=item.req?`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(185,28,28,.3)"><p style="color:${st.ok?'#fca5a5':'#9ca3af'};font-size:12px;margin-bottom:${st.ok?0:4}px">${st.ok?'✅ 已達解鎖條件':'⚠️ 條件不足'}</p>${!st.ok?`<p style="color:#6b7280;font-size:11px">${st.msg}</p>`:''}</div>`:'';const disableBtn=!canAfford||!st.ok;const btnText=!st.ok?'條件未達':(!canAfford?'迴響枯竭':'獻上迴響');const modal=E('div',{class:'modal-bg',id:'buy-modal'});modal.innerHTML=`<div class="modal"><div style="font-size:50px;margin-bottom:12px">${item.icon}</div><h3 style="font-size:18px;font-weight:700;margin-bottom:6px;color:#fca5a5">${item.name}</h3><p style="color:#9ca3af;font-size:12px;margin-bottom:16px">${item.desc}</p><div style="background:rgba(0,0,0,.5);border:1px solid #7f1d1d;border-radius:6px;padding:16px;margin-bottom:16px;text-align:left">${reqHtml}<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><p style="color:#9ca3af;font-size:12px">所需代價</p><p style="color:${item.cost===0?'#34d399':'#fca5a5'};font-size:18px;font-weight:900">${item.cost===0?'FREE 免費':'🩸 '+item.cost}</p></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><p style="color:#9ca3af;font-size:12px">持有迴響</p><p style="color:${canAfford?'#d1d5db':'#ef4444'};font-size:14px;font-weight:700">🩸 ${state.data.points}</p></div><div style="border-top:1px solid rgba(185,28,28,.3);padding-top:12px;text-align:center"><p style="color:#6b7280;font-size:11px;margin-bottom:6px">開啟儀式後，透過信使聯絡狩獵長</p><p style="color:#fca5a5;font-family:'Cinzel',serif;font-size:16px;font-weight:700;letter-spacing:2px">db371928356</p><button class="btn btn-muted btn-sm" id="copy-wechat" style="margin-top:8px;padding:6px;font-size:10px">複製聯絡方式</button></div></div><div style="display:flex;gap:10px"><button class="btn btn-sm" id="buy-confirm" ${disableBtn?'disabled':''} style="flex:1">${btnText}</button><button class="btn btn-muted btn-sm" id="buy-cancel" style="flex:1">離開</button></div></div>`;document.body.appendChild(modal);$('buy-cancel').onclick=()=>modal.remove();modal.onclick=e=>{if(e.target===modal)modal.remove();};$('copy-wechat').onclick=()=>{navigator.clipboard.writeText('db371928356').then(()=>showNotif('信使已就緒 (已複製)'));};if(!disableBtn){$('buy-confirm').onclick=()=>{updateData(d=>({...d,points:d.points-item.cost,purchased:[...d.purchased,item.id]}));modal.remove();showNotif('獲取了「'+item.name+'」');};}}

let discussTag='祕法實驗';const DISC_TAGS=[{name:'祕法實驗',c:'#9ca3af'},{name:'野獸目擊',c:'#b91c1c'},{name:'禁忌古蹟',c:'#475569'},{name:'血之建言',c:'#d97706'}];

function renderDiscuss(){
  const wrap=E('div',{class:'fade-in'});
  wrap.innerHTML=`<h2 class="section-title">獵人共鳴鐘</h2><p class="section-sub">留下建言，引導或誤導其他獵人</p>`;

  const postCard=E('div',{class:'card',style:{marginBottom:'16px'}});
  const displayName=state.data.customName||(state.role==='admin'?'狩獵長':'外來者');

  const authorRow=E('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'}});
  authorRow.innerHTML=`<span style="font-size:22px;filter:grayscale(1)">${state.role==='admin'?'🪚':'🎩'}</span><span style="font-family:'Cinzel',serif;color:#fca5a5;font-size:13px">${displayName}</span>`;
  postCard.appendChild(authorRow);

  const ta=E('textarea',{placeholder:'寫下建言 (例如：前方有埋伏，或是...讚美月亮！)',style:{marginBottom:'12px'}});
  postCard.appendChild(ta);

  const tagBar=E('div',{style:{display:'flex',gap:'8px',marginBottom:'12px',flexWrap:'wrap'}});
  DISC_TAGS.forEach(t=>{
    const pill=E('span',{class:'fpill post-tag'});
    const isActive=()=>discussTag===t.name;
    const updateStyle=()=>{pill.style.cssText=`border-color:${isActive()?t.c:'rgba(156,163,175,.2)'};background:${isActive()?t.c+'20':'rgba(0,0,0,.5)'};color:${isActive()?t.c:'#6b7280'};padding:6px 14px;border-radius:4px;font-size:11px;font-family:'Cinzel',serif;cursor:pointer;border:1px solid;transition:all .3s;white-space:nowrap;flex-shrink:0`;};
    updateStyle();
    pill.textContent=t.name;
    pill.onclick=()=>{
      discussTag=t.name;
      document.querySelectorAll('.post-tag').forEach(p=>p._update&&p._update());
    };
    pill._update=updateStyle;
    tagBar.appendChild(pill);
  });
  postCard.appendChild(tagBar);

  const postBtn=E('button',{class:'btn btn-sm'},'🩸 留下建言');
  postBtn.onclick=()=>{
    const txt=ta.value.trim();
    if(!txt){showNotif('建言不可為空');return;}
    const tc=DISC_TAGS.find(t=>t.name===discussTag).c;
    const newPost={id:Date.now(),user:displayName,avatar:state.role==='admin'?'🪚':'🎩',title:txt,replies:0,likes:0,liked:false,time:'剛剛',tag:discussTag,tc,isMine:true};
    updateData(d=>({
      ...d,
      posts: d.posts ? [newPost, ...d.posts] : [newPost]
    }));
    ta.value='';
    showNotif('建言已迴響於夢境');
  };
  postCard.appendChild(postBtn);
  wrap.appendChild(postCard);

  const posts=state.data.posts || [];
  if(posts.length===0){
    const empty=E('div',{style:{textAlign:'center',color:'#4b5563',padding:'30px 0',fontSize:'12px'}});
    empty.textContent='周圍沒有其他獵人的氣息...';
    wrap.appendChild(empty);
    return wrap;
  }
  posts.forEach(post=>{
    const card=E('div',{class:'disc-card',style:{marginBottom:'10px',cursor:'pointer'}});
    card.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><span style="font-size:20px;filter:grayscale(1)">${post.avatar}</span><div style="flex:1"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-family:'Cinzel',serif;color:#d1d5db;font-size:12px">${post.user}</span><span class="tag" style="background:${post.tc}20;border-color:${post.tc}40;color:${post.tc}">${post.tag}</span>${post.isMine?'<span class="tag" style="background:rgba(185,28,28,.1);border-color:#b91c1c;color:#fca5a5">我的建言</span>':''}</div><span style="color:#6b7280;font-size:10px">${post.time}</span></div></div><p style="color:#e5e7eb;font-size:13px;margin-bottom:12px;line-height:1.6;font-style:italic">"${post.title}"</p><div style="display:flex;gap:16px"><span style="color:#6b7280;font-size:12px">🔔 ${post.replies}</span><span class="like-btn" style="color:${post.liked?'#dc2626':'#6b7280'};font-size:12px;cursor:pointer;transition:color 0.3s">評分好意 ${post.likes}</span></div>`;
    card.querySelector('.like-btn').onclick=e=>{
      e.stopPropagation();
      updateData(d=>({...d,posts:d.posts.map(p=>p.id===post.id?{...p,likes:p.liked?p.likes-1:p.likes+1,liked:!p.liked}:p)}));
    };
    card.onclick=()=>showDiscModal(post);
    wrap.appendChild(card);
  });
  return wrap;
}

function showDiscModal(post){const existing=$('disc-modal');if(existing)existing.remove();const modal=E('div',{class:'modal-bg',id:'disc-modal'});modal.innerHTML=`<div class="modal" style="text-align:left"><div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><span style="font-size:30px;filter:grayscale(1)">${post.avatar}</span><div><p style="font-family:'Cinzel',serif;color:#fca5a5;font-size:14px">${post.user}</p><p style="color:#6b7280;font-size:11px">${post.time}</p></div></div><span class="tag" style="background:${post.tc}20;border-color:${post.tc}40;color:${post.tc};margin-bottom:12px;display:inline-block">${post.tag}</span><p style="color:#e5e7eb;font-size:14px;line-height:1.8;margin-bottom:16px;font-style:italic">"${post.title}"</p><div style="display:flex;gap:20px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(185,28,28,.3)"><span style="color:#9ca3af;font-size:13px">🔔 ${post.replies}</span><span style="color:${post.liked?'#dc2626':'#9ca3af'};font-size:13px;cursor:pointer" id="modal-like">評分好意 ${post.likes}</span></div><div style="display:flex;gap:10px">${post.isMine?'<button class="btn btn-danger btn-sm" id="disc-del" style="flex:1">抹除建言</button>':''}<button class="btn btn-muted btn-sm" id="disc-close" style="flex:1">離開</button></div></div>`;document.body.appendChild(modal);$('disc-close').onclick=()=>modal.remove();modal.onclick=e=>{if(e.target===modal)modal.remove();};$('modal-like').onclick=()=>{updateData(d=>({...d,posts:d.posts.map(p=>p.id===post.id?{...p,likes:p.liked?p.likes-1:p.likes+1,liked:!p.liked}:p)}));modal.remove();};if(post.isMine){$('disc-del').onclick=()=>{if(!confirm('確定要抹除這則建言？'))return;updateData(d=>({...d,posts:d.posts.filter(p=>p.id!==post.id)}));modal.remove();showNotif('建言已消散');};}}

function renderDraw(){const d=state.data;const COLORS=[{c:'#b91c1c',n:'死血'},{c:'#9ca3af',n:'水銀'},{c:'#0891b2',n:'古神青'},{c:'#4b5563',n:'骨灰'},{c:'#000000',n:'深淵黑'}];const DRAW_TYPES=['卡爾符文','血跡塗鴉'];const wrap=E('div',{class:'fade-in'});wrap.innerHTML=`<h2 class="section-title">刻畫符文</h2><p class="section-sub">以血與水銀銘記古神的低語</p>`;const pct=Math.min((d.todayDrawPts/5)*100,100);wrap.innerHTML+=`<div style="margin-bottom:16px;padding:12px;background:rgba(0,0,0,.5);border:1px solid #7f1d1d;border-radius:6px"><p style="color:#9ca3af;font-family:'Cinzel',serif;font-size:12px;margin-bottom:6px">今日刻印：<span style="color:#fca5a5;font-weight:700">${d.todayDrawPts} / 5 迴響</span></p><div style="height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden"><div style="width:${pct}%;height:100%;background:linear-gradient(to right,#7f1d1d,#dc2626)"></div></div></div>`;const typeBox=E('div',{style:{marginBottom:'12px'}});typeBox.innerHTML=`<label style="display:block;color:#fca5a5;font-size:12px;margin-bottom:6px">銘記之物</label>`;const drawTypeSel=E('select',{id:'draw-type-sel'});DRAW_TYPES.forEach(t=>{const opt=E('option',{value:t},t);drawTypeSel.appendChild(opt);});typeBox.appendChild(drawTypeSel);wrap.appendChild(typeBox);const colorRow=E('div',{style:{display:'flex',gap:'8px',marginBottom:'12px',flexWrap:'wrap',alignItems:'center'}});COLORS.forEach(c=>{const sw=E('div',{class:'swatch'+(state.drawColor===c.c?' active':'')});sw.style.background=c.c;sw.title=c.n;sw.onclick=()=>{state.drawColor=c.c;state.drawMode='draw';document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));sw.classList.add('active');};colorRow.appendChild(sw);});const eraser=E('button');eraser.style.cssText=`padding:6px 12px;height:32px;border-radius:4px;background:rgba(156,163,175,.1);color:${state.drawMode==='erase'?'#fff':'#9ca3af'};border:${state.drawMode==='erase'?'1px solid #fca5a5':'1px solid #4b5563'};cursor:pointer;font-size:12px;font-family:'Noto Serif TC',serif;`;eraser.textContent='拭去血跡';eraser.onclick=()=>{state.drawMode=state.drawMode==='erase'?'draw':'erase';renderTabContent();};colorRow.appendChild(eraser);wrap.appendChild(colorRow);const sizeRow=E('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'14px'}});sizeRow.innerHTML=`<span style="color:#9ca3af;font-size:12px;white-space:nowrap">力度</span>`;const sizeSlider=E('input',{type:'range',min:'1',max:'40',value:state.drawSize,style:{flex:'1'}});const sizeLabel=E('span',{style:{color:'#fca5a5',font:'12px/1 Cinzel,serif',minWidth:'32px'}},state.drawSize+'px');sizeSlider.oninput=()=>{state.drawSize=parseInt(sizeSlider.value);sizeLabel.textContent=state.drawSize+'px';};sizeRow.appendChild(sizeSlider);sizeRow.appendChild(sizeLabel);wrap.appendChild(sizeRow);const canvas=E('canvas',{id:'draw-canvas',width:'800',height:'500'});wrap.appendChild(canvas);const btnRow=E('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px',margin:'16px 0'}});const clearBtn=E('button',{class:'btn btn-muted btn-sm'},'🗑️ 洗淨');const dlBtn=E('button',{class:'btn btn-muted btn-sm'},'💾 剝取');const submitBtn=E('button',{class:'btn btn-sm'},'🩸 獻祭');submitBtn.disabled=d.todayDrawPts>=5;if(d.todayDrawPts>=5)submitBtn.textContent='✓ 已滿足';clearBtn.onclick=()=>{const ctx=canvas.getContext('2d');ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,800,500);showNotif('血跡已洗淨');};dlBtn.onclick=()=>{const a=document.createElement('a');a.href=canvas.toDataURL();a.download='卡爾符文.png';a.click();showNotif('已剝取符文');};submitBtn.onclick=()=>{const pts=d.todayDrawPts<5?5:0;const typeSel=$('draw-type-sel');const subType=typeSel?typeSel.value:'卡爾符文';const img=canvas.toDataURL();updateData(prev=>({...prev,drawings:[{id:Date.now(),image:img,subType,time:new Date().toLocaleDateString('zh-TW'),timestamp:Date.now()},...prev.drawings],todayDrawPts:prev.todayDrawPts+pts,points:prev.points+pts,lastDrawDate:new Date().toDateString()}));showNotif(pts>0?'獻祭成功！+'+pts+' 迴響':'刻印已保留於夢境');const ctx=canvas.getContext('2d');ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,800,500);};btnRow.appendChild(clearBtn);btnRow.appendChild(dlBtn);btnRow.appendChild(submitBtn);wrap.appendChild(btnRow);if(d.drawings.length>0){const gallDiv=E('div');gallDiv.innerHTML=`<p class="sec-label">✦ 銘記之印（${d.drawings.length}）</p>`;const gallGrid=E('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px'}});d.drawings.slice(0,12).forEach(dw=>{const cell=E('div',{style:{position:'relative'}});const img=E('img',{src:dw.image,style:{width:'100%',aspectRatio:'1.6',objectFit:'cover',borderRadius:'4px',border:'1px solid #4b5563',display:'block',filter:'contrast(1.2) brightness(0.8)'}});let pressTimer;img.addEventListener('touchstart',()=>{pressTimer=setTimeout(()=>{if(confirm('要抹除這個不祥的印記嗎？')){updateData(d=>({...d,drawings:d.drawings.filter(x=>x.id!==dw.id)}));showNotif('印記已抹除');}},600);});img.addEventListener('touchend',()=>clearTimeout(pressTimer));img.addEventListener('touchmove',()=>clearTimeout(pressTimer));cell.appendChild(img);const hint=E('div',{style:{textAlign:'center',color:'#6b7280',fontSize:'10px',marginTop:'4px'}});hint.textContent='長按抹除';cell.appendChild(hint);gallGrid.appendChild(cell);});gallDiv.appendChild(gallGrid);wrap.appendChild(gallDiv);}setTimeout(()=>{const c=$('draw-canvas');if(!c)return;const ctx=c.getContext('2d');ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,800,500);let drawing=false;const getPos=e=>{const rect=c.getBoundingClientRect();const scX=c.width/rect.width,scY=c.height/rect.height;const clientX=e.clientX||e.touches?.[0]?.clientX;const clientY=e.clientY||e.touches?.[0]?.clientY;return{x:(clientX-rect.left)*scX,y:(clientY-rect.top)*scY};};const start=e=>{e.preventDefault();const{x,y}=getPos(e);ctx.beginPath();ctx.moveTo(x,y);drawing=true;};const move=e=>{if(!drawing)return;e.preventDefault();const{x,y}=getPos(e);ctx.lineWidth=state.drawSize;ctx.lineCap='round';ctx.strokeStyle=state.drawMode==='erase'?'#0a0a0f':state.drawColor;ctx.shadowBlur=state.drawMode==='erase'?0:5;ctx.shadowColor=state.drawMode==='erase'?'transparent':state.drawColor;ctx.lineTo(x,y);ctx.stroke();};const end=()=>drawing=false;c.addEventListener('mousedown',start);c.addEventListener('mousemove',move);c.addEventListener('mouseup',end);c.addEventListener('mouseleave',end);c.addEventListener('touchstart',start,{passive:false});c.addEventListener('touchmove',move,{passive:false});c.addEventListener('touchend',end);},50);return wrap;}

function getAutoTitles(data){const n=data.uploads.filter(u=>u.type==='forbidden'&&u.verifiedSuccess).length;const out=[];if(n>=10)out.push({id:'auto_1',name:'墓碑點亮者',icon:'🏮',desc:'成功探索禁忌10次',type:'title'});if(n>=50)out.push({id:'auto_2',name:'血源探尋者',icon:'🩸',desc:'成功探索禁忌50次',type:'title'});if(n>=100)out.push({id:'auto_3',name:'看見真相之人',icon:'👁️',desc:'成功探索禁忌100次',type:'title'});return out;}

function renderProfile(){const d=state.data;const autoTitles=getAutoTitles(d);const allItems=SHOP.concat(autoTitles);const ownedTitles=SHOP.filter(i=>d.purchased.includes(i.id)&&i.type==='title').concat(autoTitles);const cur=d.currentTitle?allItems.find(s=>s.id===d.currentTitle):null;const level=Math.floor(d.points/250)+1;const displayName=d.customName||(state.role==='admin'?'狩獵長':'外來者');const magicMap={};d.purchased.forEach(id=>{const it=SHOP.find(i=>i.id===id&&i.type==='arcane');if(it)magicMap[it.name]=(magicMap[it.name]||0)+1;});const otherOwned=SHOP.filter(i=>d.purchased.includes(i.id)&&i.type!=='title'&&i.type!=='arcane');const wrap=E('div',{class:'fade-in'});wrap.innerHTML=`<h2 class="section-title" style="margin-bottom:20px">獵人狀態</h2><div class="card" style="background:rgba(0,0,0,.6);margin-bottom:16px;text-align:center;padding:24px"><div style="font-size:48px;margin-bottom:12px;filter:grayscale(1)">${state.role==='admin'?'🪚':'🎩'}</div><h3 class="grad-text" style="font-family:'Cinzel Decorative',serif;font-size:20px;margin-bottom:6px">${displayName}</h3><p style="color:#9ca3af;font-size:12px;margin-bottom:20px">${cur?cur.icon+' '+cur.name:'遊蕩的獵人'}</p><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px"><div><p style="color:#fca5a5;font-size:10px;font-family:'Cinzel',serif;margin-bottom:4px">階級</p><p style="font-size:16px;font-weight:700">Lv.${level}</p></div><div><p style="color:#fca5a5;font-size:10px;font-family:'Cinzel',serif;margin-bottom:4px">血之迴響</p><p style="font-size:16px;font-weight:700">${d.points}</p></div><div><p style="color:#fca5a5;font-size:10px;font-family:'Cinzel',serif;margin-bottom:4px">靈視稱號</p><p style="font-size:16px;font-weight:700">${ownedTitles.length}</p></div></div></div>`;const nameCard=E('div',{class:'card',style:{marginBottom:'12px'}});nameCard.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><p class="sec-label" style="margin-bottom:0;border:none">✦ 墓碑銘文</p></div><p style="font-size:14px;color:#e5e7eb">${displayName}</p>`;const nameBtn=E('button',{style:{background:'rgba(185,28,28,.1)',border:'1px solid #7f1d1d',color:'#fca5a5',padding:'6px 12px',borderRadius:'4px',fontSize:'11px',cursor:'pointer'}},'重刻');nameBtn.onclick=()=>showNameChangeModal();nameCard.querySelector('div').appendChild(nameBtn);wrap.appendChild(nameCard);const titleCard=E('div',{class:'card',style:{marginBottom:'12px'}});titleCard.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><p class="sec-label" style="margin-bottom:0;border:none">✦ 當前身分</p></div>${cur?`<div style="display:flex;gap:12px;align-items:center;padding:12px;background:rgba(0,0,0,.5);border:1px solid #7f1d1d;border-radius:6px"><span style="font-size:24px;filter:drop-shadow(0 0 5px rgba(255,0,0,0.3))">${cur.icon}</span><div><p style="color:#fca5a5;font-size:13px;font-weight:700;margin-bottom:2px">${cur.name}</p><p style="color:#9ca3af;font-size:10px">${cur.desc}</p></div></div>`:'<p style="font-size:12px;color:#6b7280;padding:8px 0">未受任何教派指引</p>'}`;const switchBtn=E('button',{style:{background:'rgba(185,28,28,.1)',border:'1px solid #7f1d1d',color:'#fca5a5',padding:'6px 12px',borderRadius:'4px',fontSize:'11px',cursor:'pointer'}},'變更');switchBtn.onclick=()=>showTitleModal(ownedTitles,d.currentTitle);titleCard.querySelector('div').appendChild(switchBtn);wrap.appendChild(titleCard);if(Object.keys(magicMap).length>0){const mc=E('div',{class:'card',style:{marginBottom:'12px'}});mc.innerHTML=`<p class="sec-label">✦ 掌握之祕法</p><div style="display:flex;gap:8px;flex-wrap:wrap">${Object.entries(magicMap).map(([n,c])=>`<span class="tag" style="background:rgba(156,163,175,.1);border-color:#4b5563;color:#d1d5db;padding:6px 10px">${n}${c>1?' ×'+c:''}</span>`).join('')}</div>`;wrap.appendChild(mc);}if(otherOwned.length>0){const oc=E('div',{class:'card',style:{marginBottom:'12px'}});oc.innerHTML=`<p class="sec-label">✦ 獵人武裝</p><div style="display:flex;gap:8px;flex-wrap:wrap">${otherOwned.map(i=>`<span class="tag" style="background:rgba(185,28,28,.1);border-color:#7f1d1d;color:#fca5a5;padding:6px 10px">${i.icon} ${i.name}</span>`).join('')}</div>`;wrap.appendChild(oc);}const ac=E('div',{class:'card',style:{marginBottom:'16px',fontSize:'12px'}});ac.innerHTML=`<p class="sec-label">✦ 契約詳細</p>${[['契約',state.role==='admin'?'狩獵長':'外來者'],['階層',state.role==='admin'?'上位者':'普通獵人'],['甦醒日',d.joinDate||'—'],['入夢次數',d.loginCount],['獵殺總計',d.uploads.length],['符文刻印',d.drawings.length]].map(([l,v])=>`<p style="color:#9ca3af;margin-bottom:8px;display:flex;justify-content:space-between"><span>${l}</span><span style="color:#d1d5db">${v}</span></p>`).join('')}`;wrap.appendChild(ac);const logoutBtn=E('button',{class:'btn btn-muted',style:{marginBottom:'10px'}},'🚪 甦醒 (登出)');logoutBtn.onclick=()=>{localStorage.removeItem('bloodborne_session');state.role=null;state.data=null;state.stage='login';render();};const resetBtn=E('button',{class:'btn btn-danger'},'⚠️ 斬斷循環 (重置數據)');resetBtn.onclick=()=>{if(!confirm('這將抹除你所有的血與記憶，確定要斬斷循環嗎？'))return;updateData(Object.assign(defaultData(),{joinDate:new Date().toLocaleDateString('zh-TW'),lastDrawDate:new Date().toDateString()}));showNotif('記憶已歸零');};wrap.appendChild(logoutBtn);wrap.appendChild(resetBtn);return wrap;}

function showNameChangeModal(){const existing=$('name-modal');if(existing)existing.remove();const modal=E('div',{class:'modal-bg',id:'name-modal'});modal.innerHTML=`<div class="modal"><h3 style="font-size:16px;color:#fca5a5;margin-bottom:16px">重刻墓碑銘文</h3><input id="new-name-inp" type="text" placeholder="輸入新名稱（最多12字）" maxlength="12" style="margin-bottom:16px"><div style="display:flex;gap:10px"><button class="btn btn-sm" id="name-ok" style="flex:1">確定</button><button class="btn btn-muted btn-sm" id="name-cancel" style="flex:1">放棄</button></div></div>`;document.body.appendChild(modal);$('name-cancel').onclick=()=>modal.remove();modal.onclick=e=>{if(e.target===modal)modal.remove();};$('name-ok').onclick=()=>{const val=$('new-name-inp').value.trim();if(!val){showNotif('名稱不可空白');return;}updateData(d=>({...d,customName:val}));modal.remove();showNotif('銘文已重刻');};}

function showTitleModal(titles,currentId){const existing=$('title-modal');if(existing)existing.remove();const modal=E('div',{class:'modal-bg',id:'title-modal'});const list=titles.map(t=>`<div onclick="selectTitle(${typeof t.id==='number'?t.id:'"'+t.id+'"'})" style="padding:12px;background:${currentId===t.id?'rgba(185,28,28,.15)':'rgba(0,0,0,.5)'};border:1px solid ${currentId===t.id?'#dc2626':'#4b5563'};border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:all 0.3s"><span style="font-size:24px;filter:drop-shadow(0 0 5px rgba(255,0,0,0.3))">${t.icon}</span><div><p style="color:#fca5a5;font-size:13px;font-weight:700;margin-bottom:2px">${t.name}</p><p style="color:#9ca3af;font-size:10px">${t.desc}</p></div>${currentId===t.id?'<span style="color:#dc2626;margin-left:auto;font-size:16px;font-weight:bold">✓</span>':''}</div>`).join('');modal.innerHTML=`<div class="modal" style="text-align:left;max-height:80vh;overflow-y:auto"><h3 style="font-size:16px;text-align:center;margin-bottom:16px;color:#fca5a5">選擇教派或身分</h3>${titles.length===0?'<p style="text-align:center;color:#6b7280;font-size:12px;padding:20px 0">你尚未獲得任何啟蒙稱號</p>':list}<div style="display:flex;gap:10px;margin-top:12px"><button class="btn btn-muted btn-sm" onclick="clearTitle()" style="flex:1">隱匿身分</button><button class="btn btn-muted btn-sm" id="title-cancel" style="flex:1">關閉</button></div></div>`;document.body.appendChild(modal);$('title-cancel').onclick=()=>modal.remove();modal.onclick=e=>{if(e.target===modal)modal.remove();};}
window.selectTitle=function(id){updateData(d=>({...d,currentTitle:id}));const m=$('title-modal');if(m)m.remove();showNotif('身分已切換');};
window.clearTitle=function(){updateData(d=>({...d,currentTitle:null}));const m=$('title-modal');if(m)m.remove();showNotif('已隱匿身分');};

document.body.innerHTML=`<div id="bg" style="position:fixed;inset:0;pointer-events:none;overflow:hidden"></div><div id="notif" class="notif" style="display:none"></div><div id="app-content" style="height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto"></div>`;
initBg();
render();
</script>
</body>
</html>
